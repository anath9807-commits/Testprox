name: Build Android APK
on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build APK
        uses: valerii-kyryliuk/website-to-android-app-action@v1.1
        with:
          # यहाँ अपना वो लिंक पेस्ट करें जो आपने स्टेप 2 में कॉपी किया था
          websiteUrl: 'https://anath9807.github.io/Testprox/'
          appName: 'TEST PRO'
          packageName: 'com.vinay.testpro'
          icon: 'https://cdn-icons-png.flaticon.com/512/5609/5609138.png'
