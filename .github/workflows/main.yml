name: Build Android APK

on:
  push:
    branches: [ main ] # Jab bhi aap main branch par code push karenge, build shuru ho jayega

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Dependencies
      run: npm install

    - name: Build Android APK
      run: |
        # Yahan wo command aayegi jo aapka framework use karta hai (e.g., Capacitor or Cordova)
        # Agar aap simple HTML use kar rahe hain, toh Capacitor sabse best hai
        npx cap copy
        npx cap build android

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
